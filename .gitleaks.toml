[extend]
# Extend the default gitleaks ruleset
useDefault = true

[allowlist]
description = "Global allowlist to ignore historical scripts with revoked keys and mock secrets/hashes in documentation/testing code."
paths = [
  '''generator/.*\.py''',
  '''docs/GCP_CLOUD_RUN_DEPLOYMENT\.md''',
  '''web/scripts/register_parameters\.ts''',
  '''web/db_deploy\.js''',
  '''web/src/lib/db\.ts''',
  '''web/src/lib/db/seeds\.ts'''
]

