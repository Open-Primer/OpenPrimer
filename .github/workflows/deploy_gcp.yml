name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - master
    paths:
      - 'web/**'
      - '.github/workflows/deploy_gcp.yml'

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker europe-west9-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          echo "Submitting build asynchronously..."
          BUILD_ID=$(gcloud builds submit ./web \
            --tag europe-west9-docker.pkg.dev/openprimer-free/openprimer-repo/web-app:latest \
            --project=openprimer-free \
            --async \
            --format="value(id)")
          
          echo "Build submitted successfully. Build ID: $BUILD_ID"
          echo "Polling build status..."
          
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID --project=openprimer-free --format="value(status)")
            echo "Current status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Build completed successfully!"
              break
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "INTERNAL_ERROR" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy openprimer-worker \
            --image=europe-west9-docker.pkg.dev/openprimer-free/openprimer-repo/web-app:latest \
            --platform=managed \
            --region=europe-west9 \
            --port=3000 \
            --set-env-vars="NEXT_PUBLIC_SUPABASE_URL=https://cayylzaasyqqpvuezufy.supabase.co,SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }},CRON_SECRET=${{ secrets.CRON_SECRET }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --project=openprimer-free
